<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Rock Paper Game</title>
  <link rel="stylesheet" href="index.css"/>
</head>

<body>
 
  <div id="game-container">
    <div id="game-buttons">
      <p id="header"><u>Rock Paper Scissors Game</u></p>
      <div id="butt">
        <button data-choice="paper">✋</button>
        <button data-choice="scissor">🤞</button>
        <button data-choice="rock">✊</button>
      </div>
      <p id="player-move">Player :<span></span></p>
      <p id="computer-move">Computer :<span></span></p>
      <p id="result">Result :<span></span></p>
      <p id="score-rate"><span></span></p>
    </div></div>
  </div>
  <script src="config.js"></script>
</body>
</html>
